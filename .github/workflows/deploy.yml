name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      
      # Step 1: Wipe the physical patches folder completely
      - name: Delete physical patches folder
        run: rm -rf patches

      # Step 2: Strip patches from package.json config
      - name: Strip broken patches from config
        run: node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); delete pkg.patchedDependencies; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"

      # Step 3: Run install completely clean
      - run: pnpm install --no-lockfile
      - run: pnpm build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
      
