name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # We removed the cache here so GitHub stops remembering old broken files
      
      - name: The Ultimate Patch Remover
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          function cleanPackages(dir) {
            const files = fs.readdirSync(dir);
            for (const file of files) {
              const fullPath = path.join(dir, file);
              if (file === 'node_modules' || file === '.git') continue;
              if (fs.statSync(fullPath).isDirectory()) {
                cleanPackages(fullPath);
              } else if (file === 'package.json') {
                try {
                  const pkg = JSON.parse(fs.readFileSync(fullPath, 'utf8'));
                  let changed = false;
                  
                  // This checks BOTH standard and nested pnpm configurations
                  if (pkg.patchedDependencies) { delete pkg.patchedDependencies; changed = true; }
                  if (pkg.pnpm && pkg.pnpm.patchedDependencies) { delete pkg.pnpm.patchedDependencies; changed = true; }
                  
                  if (changed) {
                    fs.writeFileSync(fullPath, JSON.stringify(pkg, null, 2));
                    console.log('Cleaned patches from: ' + fullPath);
                  }
                } catch (e) {}
              }
            }
          }
          cleanPackages('.');
          "
          rm -rf patches
          rm -f pnpm-lock.yaml
          rm -f */pnpm-lock.yaml

      - run: pnpm install --no-frozen-lockfile --ignore-scripts
      - run: pnpm build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
      
