name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      
      # Step 1: Wipe physical patches everywhere
      - name: Delete physical patches folder
        run: rm -rf patches

      # Step 2: Search EVERY folder for package.json and strip patchedDependencies
      - name: Strip broken patches from all workspace projects
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          function cleanPackages(dir) {
            const files = fs.readdirSync(dir);
            for (const file of files) {
              const fullPath = path.join(dir, file);
              if (file === 'node_modules') continue;
              if (fs.statSync(fullPath).isDirectory()) {
                cleanPackages(fullPath);
              } else if (file === 'package.json') {
                try {
                  const pkg = JSON.parse(fs.readFileSync(fullPath, 'utf8'));
                  if (pkg.patchedDependencies) {
                    delete pkg.patchedDependencies;
                    fs.writeFileSync(fullPath, JSON.stringify(pkg, null, 2));
                    console.log('Cleaned patches from: ' + fullPath);
                  }
                } catch (e) {}
              }
            }
          }
          cleanPackages('.');
          "

      # Step 3: Run install with a flag telling pnpm to completely ignore workspace patch rules
      - run: pnpm install --no-lockfile --ignore-scripts
      - run: pnpm build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
      
